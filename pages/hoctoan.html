<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔢 Bé Học Toán Lớp 2 - Tự Học Trực Quan</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== MODERN MATH PREMIUM UI ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      color: #2d3748;
      overflow-x: hidden;
    }

    .container-main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .fun-header {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 20px 30px;
      box-shadow: 0 8px 25px rgba(237, 137, 54, 0.15);
      margin-bottom: 20px;
      text-align: center;
      position: relative;
    }

    .fun-header h1 {
      margin: 0;
      font-size: 2em;
      font-weight: 700;
      background: linear-gradient(135deg, #ed8936 0%, #f6ad55 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lesson-title-sub {
      font-size: 1.1em;
      color: #718096;
      font-weight: 600;
      margin-top: 5px;
    }

    /* Progress bar */
    .progress-container {
      background: white;
      border-radius: 20px;
      padding: 15px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }

    .progress-text {
      font-size: 1.1em;
      font-weight: 700;
      color: #ed8936;
      margin-bottom: 10px;
      text-align: center;
    }

    .progress-bar-custom {
      height: 24px;
      background: #edf2f7;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
      border-radius: 12px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9em;
      box-shadow: 0 2px 8px rgba(253, 160, 133, 0.4);
    }

    /* Scoreboard */
    .score-display {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .score-item {
      background: white;
      padding: 10px 20px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      font-size: 1.1em;
      font-weight: 700;
    }

    .score-correct { color: #48bb78; }
    .score-wrong { color: #f56565; }
    .score-streak { color: #ed8936; }

    /* Learning Card */
    .main-card {
      background: white;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Instruction Screen styling */
    .instruction-screen {
      width: 100%;
      max-width: 750px;
      animation: slideUp 0.6s ease-out;
    }

    .instruction-title {
      font-size: 1.8em;
      font-weight: 700;
      color: #dd6b20;
      margin-bottom: 15px;
      text-align: center;
    }

    .instruction-content {
      background: #fffaf0;
      border: 2px solid #feebc8;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      font-size: 1.1em;
      line-height: 1.7;
    }

    /* Question Display styles */
    .question-display-area {
      width: 100%;
      text-align: center;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .math-expression {
      font-size: 3.5em;
      font-weight: 800;
      color: #2d3748;
      letter-spacing: 5px;
      margin: 20px 0;
    }

    .math-text-question {
      font-size: 1.5em;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Interactive SVG Containers */
    .visual-container {
      margin: 20px 0;
      background: #f7fafc;
      border-radius: 20px;
      padding: 20px;
      border: 2px dashed #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      width: 100%;
      max-width: 500px;
    }

    /* Options buttons Grid */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
    }

    .option-btn {
      font-size: 1.5em;
      font-weight: 700;
      padding: 20px;
      border: 3px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #2d3748;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    }

    .option-btn:hover:not(.disabled) {
      transform: translateY(-4px);
      border-color: #fda085;
      box-shadow: 0 10px 20px rgba(253, 160, 133, 0.25);
      background: #fffaf0;
    }

    .option-btn.correct {
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
    }

    .option-btn.wrong {
      background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(245, 101, 101, 0.4);
    }

    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    /* Vertical Math Explanation Panel */
    .explanation-panel {
      width: 100%;
      max-width: 500px;
      background: #fffaf0;
      border-radius: 20px;
      border: 2px solid #feebc8;
      padding: 25px;
      margin-top: 25px;
      box-shadow: 0 4px 15px rgba(221, 107, 32, 0.05);
      animation: slideUp 0.5s ease-out;
    }

    .explanation-title {
      font-weight: 700;
      color: #dd6b20;
      margin-bottom: 15px;
      font-size: 1.2em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vertical-calc {
      font-family: 'Courier New', Courier, monospace;
      font-size: 2.2em;
      font-weight: 700;
      line-height: 1.2;
      text-align: right;
      width: fit-content;
      margin: 0 auto 20px auto;
      padding: 10px 20px;
      border-bottom: 4px double #4a5568;
    }

    .vertical-line-detail {
      font-size: 1.05em;
      line-height: 1.6;
      color: #4a5568;
    }

    .step-number-badge {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: #dd6b20;
      color: white;
      border-radius: 50%;
      text-align: center;
      font-size: 0.85em;
      line-height: 24px;
      font-weight: 700;
      margin-right: 8px;
    }

    /* Welcome / Summary Screen */
    .welcome-container {
      text-align: center;
    }

    .btn-fun {
      padding: 15px 40px;
      font-size: 1.2em;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      color: white;
      margin: 10px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-fun:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .btn-start {
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
    }

    .btn-home {
      background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
    }

    .btn-retry {
      background: linear-gradient(135deg, #ed8936 0%, #f6ad55 100%);
    }

    .hidden {
      display: none !important;
    }

    /* Animations */
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Confetti & Stars */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear forwards;
      z-index: 9999;
    }

    .star-pop {
      position: fixed;
      font-size: 3em;
      animation: starFloat 1.5s ease-out forwards;
      z-index: 9999;
      pointer-events: none;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes starFloat {
      0% { transform: translate(0, 0) scale(0); opacity: 1; }
      50% { transform: translate(0, -100px) scale(1.2); }
      100% { transform: translate(0, -150px) scale(0); opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="container-main">
    <!-- Header -->
    <div class="fun-header">
      <h1 id="page-title">🔢 Bé Học Toán Lớp 2</h1>
      <div class="lesson-title-sub" id="lesson-title">Đang tải bài học...</div>
    </div>

    <!-- Progress Indicator -->
    <div class="progress-container hidden" id="progress-container">
      <div class="progress-text" id="progress-text">Câu 1/10</div>
      <div class="progress-bar-custom">
        <div class="progress-bar-fill" id="progress-bar" style="width: 0%">0%</div>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="score-display hidden" id="score-display">
      <div class="score-item score-correct">✅ Đúng: <span id="score-correct">0</span></div>
      <div class="score-item score-wrong">❌ Sai: <span id="score-wrong">0</span></div>
      <div class="score-item score-streak">🔥 Streak: <span id="score-streak">0</span></div>
    </div>

    <!-- Main Learning Card -->
    <div class="main-card" id="main-card">
      <!-- Màn hình chào -->
      <div class="welcome-container" id="welcome-screen">
        <h2>🎮 Con đã sẵn sàng học toán chưa?</h2>
        <p class="text-muted mt-3 mb-4">Con hãy xem qua phần hướng dẫn tự học trước khi bắt đầu luyện tập làm bài nhé! 🌟</p>
        <button class="btn-fun btn-start" onclick="showInstruction()">💡 Xem hướng dẫn tự học</button>
        <a href="../index.html" class="btn-fun btn-home">🏠 Trang chủ</a>
      </div>

      <!-- Vùng câu hỏi sẽ hiển thị động -->
      <div class="quiz-area hidden" id="quiz-area"></div>
      
      <!-- Panel giải thích khi chọn sai -->
      <div class="explanation-panel hidden" id="explanation-panel"></div>
    </div>
  </div>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Static Lesson Data fallbacks -->
  <script src="../data/english_lessons.js"></script>
  <script src="../data/math_lessons.js"></script>

  <!-- Configs & Managers -->
  <script src="../js/firebase-config.js"></script>
  <script src="../js/quiz-progress.js"></script>
  <script src="../js/lesson-loader.js"></script>
  <script src="../js/math-question-gen.js"></script>

  <!-- Interactive Logic Script -->
  <script>
    let currentLessonId = '';
    let lessonData = null;
    let quizQuestions = [];
    let currentQuestionIndex = 0;
    
    let correctCount = 0;
    let wrongCount = 0;
    let streakCount = 0;
    let maxStreak = 0;
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Khởi tạo ProgressManager
      await ProgressManager.init();

      // 2. Load dữ liệu bài học từ URL
      const urlParams = new URLSearchParams(window.location.search);
      currentLessonId = urlParams.get('lesson') || 'M1';
      
      try {
        lessonData = await LessonLoader.loadLesson('math', currentLessonId);
        if (lessonData) {
          document.getElementById('lesson-title').textContent = lessonData.title;
        } else {
          document.getElementById('lesson-title').textContent = 'Bài học không tồn tại';
        }
      } catch (e) {
        console.error('Error loading math lesson:', e);
        document.getElementById('lesson-title').textContent = 'Lỗi tải bài học';
      }
    });

    // HIỂN THỊ MÀN HÌNH HƯỚNG DẪN TỰ HỌC TRỰC QUAN (LÝ THUYẾT BAN ĐẦU)
    function showInstruction() {
      if (!lessonData) {
        alert('Đang tải dữ liệu bài học, vui lòng đợi...');
        return;
      }

      document.getElementById('welcome-screen').classList.add('hidden');
      
      const mainCard = document.getElementById('main-card');
      const insDiv = document.createElement('div');
      insDiv.className = 'instruction-screen';

      const type = lessonData.type;
      let explanationHtml = '';
      let visualHtml = '';

      // Tự động đọc lời chào của bài hướng dẫn
      speakText(`Chào mừng con đến với phần hướng dẫn tự học của bài: ${lessonData.title}. Hãy cùng cô xem qua cách làm nhé!`);

      // Sinh nội dung hướng dẫn trực quan theo loại bài học (lessonData.type)
      if (type.includes('addition_carry')) {
        // Cộng có nhớ
        explanationHtml = `
          <p><b>1. Đặt tính thẳng cột:</b> Viết các số sao cho chữ số hàng đơn vị thẳng hàng đơn vị, hàng chục thẳng hàng chục.</p>
          <p><b>2. Thực hiện cộng từ phải sang trái (bắt đầu từ hàng đơn vị):</b></p>
          <div class="mt-2"><span class="step-number-badge">1</span>Hàng đơn vị cộng lại lớn hơn hoặc bằng 10, ta <b>viết chữ số hàng đơn vị</b> và <b>nhớ 1</b> sang hàng chục.</div>
          <div class="mt-2"><span class="step-number-badge">2</span>Hàng chục cộng lại và nhớ thêm 1 chục vừa mượn.</div>
        `;
        visualHtml = `
          <div class="vertical-calc">
             38<br>
          +  25<br>
          ------<br>
             63
          </div>
          <div style="font-size:0.95em; color:#718096; text-align:center;">Ví dụ: 8 + 5 = 13 (viết 3 nhớ 1). 3 + 2 = 5 thêm 1 bằng 6. Kết quả là 63.</div>
        `;
      } else if (type.includes('subtraction_borrow')) {
        // Trừ có nhớ
        explanationHtml = `
          <p><b>1. Đặt tính thẳng cột:</b> Hàng đơn vị thẳng hàng đơn vị, hàng chục thẳng hàng chục.</p>
          <p><b>2. Thực hiện trừ từ phải sang trái (bắt đầu từ hàng đơn vị):</b></p>
          <div class="mt-2"><span class="step-number-badge">1</span>Hàng đơn vị của số bị trừ bé hơn số trừ, ta <b>mượn 1 chục</b> (cộng thêm 10) để trừ, rồi <b>nhớ 1</b> trả vào hàng chục tiếp theo.</div>
          <div class="mt-2"><span class="step-number-badge">2</span>Hàng chục của số trừ cộng thêm 1 chục nhớ, lấy hàng chục số bị trừ trừ đi.</div>
        `;
        visualHtml = `
          <div class="vertical-calc">
             52<br>
          -  18<br>
          ------<br>
             34
          </div>
          <div style="font-size:0.95em; color:#718096; text-align:center;">Ví dụ: 2 không trừ được 8, mượn 1 chục là 12 - 8 = 4 (viết 4 nhớ 1). 1 thêm 1 bằng 2, 5 - 2 = 3. Kết quả là 34.</div>
        `;
      } else if (type === 'time_hours_minutes') {
        // Xem giờ
        explanationHtml = `
          <p><b>1. Kim ngắn màu đen:</b> Chỉ giờ. Kim ngắn chỉ vào số nào thì là giờ đó.</p>
          <p><b>2. Kim dài màu đỏ:</b> Chỉ phút.</p>
          <div class="mt-2"><span class="step-number-badge">★</span>Khi kim dài chỉ đúng <b>số 12</b>, đó là <b>giờ đúng</b> (ví dụ: 8 giờ đúng).</div>
          <div class="mt-2"><span class="step-number-badge">★</span>Khi kim dài chỉ đúng <b>số 6</b>, đó là <b>giờ rưỡi</b> hay 30 phút (ví dụ: 8 giờ 30 phút).</div>
        `;
        visualHtml = drawClockSVG(8, 30); // Đồng hồ chỉ 8h30
      } else if (type === 'length_dm_m_km' || type === 'measurement_length_practice') {
        // Đo độ dài thước kẻ
        explanationHtml = `
          <p><b>Cách dùng thước kẻ đo độ dài:</b></p>
          <div class="mt-2"><span class="step-number-badge">1</span>Đặt một đầu của vật trùng với vạch số <b>0</b> của thước kẻ.</div>
          <div class="mt-2"><span class="step-number-badge">2</span>Đầu còn lại của vật trùng với vạch số nào thì đó là chiều dài của vật đó (đơn vị xăng-ti-mét hoặc đề-xi-mét).</div>
          <div class="mt-3"><i>Lưu ý đổi đơn vị: 1 dm = 10 cm, 1 m = 10 dm, 1 km = 1000 m.</i></div>
        `;
        visualHtml = drawRulerSVG(5, 'cm'); // Thước kẻ đo 5cm
      } else if (type === 'vietnamese_money') {
        // Tiền tệ
        explanationHtml = `
          <p><b>Tìm hiểu Tiền Việt Nam:</b></p>
          <p>Bé học cách cộng giá trị của các tờ tiền giấy để mua đồ vật:</p>
          <div class="mt-2"><span class="step-number-badge">★</span>Cộng các mệnh giá lại với nhau: Ví dụ tờ 500 đồng và tờ 200 đồng. Ta lấy <b>500 + 200 = 700 đồng</b>.</div>
        `;
        visualHtml = `
          <div class="d-flex justify-content-center gap-2 align-items-center">
            <div style="background:#e2e8f0; border: 2px solid #cbd5e0; padding:15px; border-radius:10px; font-weight:bold;">💵 500 đ</div>
            <div style="font-size:1.5em; font-weight:bold;">+</div>
            <div style="background:#e2e8f0; border: 2px solid #cbd5e0; padding:15px; border-radius:10px; font-weight:bold;">💵 200 đ</div>
            <div style="font-size:1.5em; font-weight:bold;">=</div>
            <div style="background:#feebc8; border: 2px solid #fbd38d; padding:15px; border-radius:10px; font-weight:bold; color:#dd6b20;">💵 700 đ</div>
          </div>
        `;
      } else if (type.includes('multiplication')) {
        // Phép nhân
        explanationHtml = `
          <p><b>Bản chất của Phép nhân:</b></p>
          <p>Phép nhân là cách viết ngắn gọn của một phép tính cộng có nhiều số giống hệt nhau:</p>
          <div class="mt-2"><span class="step-number-badge">★</span>Ví dụ: <b>2 + 2 + 2 + 2 = 8</b>. Số 2 được cộng lại 4 lần. Ta viết thành phép nhân: <b>2 x 4 = 8</b>.</div>
          <div class="mt-2"><span class="step-number-badge">★</span>Các số nhân với nhau gọi là <b>Thừa số</b>, kết quả gọi là <b>Tích</b>.</div>
        `;
        visualHtml = `
          <div style="font-size: 1.5em; font-weight:bold; text-align:center;">2 + 2 + 2 + 2 = 2 x 4 = 8</div>
        `;
      } else if (type.includes('division')) {
        // Phép chia
        explanationHtml = `
          <p><b>Bản chất của Phép chia:</b></p>
          <p>Phép chia dùng để chia đều một số lượng đồ vật thành các phần bằng nhau:</p>
          <div class="mt-2"><span class="step-number-badge">★</span>Ví dụ: Có 10 quả táo chia đều cho 2 bạn. Mỗi bạn sẽ nhận được bao nhiêu quả? Ta làm phép chia: <b>10 : 2 = 5 quả táo</b>.</div>
          <div class="mt-2"><span class="step-number-badge">★</span>Số bị chia là 10, Số chia là 2, Thương (kết quả) là 5.</div>
        `;
        visualHtml = `
          <div style="font-size: 1.5em; font-weight:bold; text-align:center;">10 : 2 = 5</div>
        `;
      } else {
        // Hướng dẫn chung
        explanationHtml = `
          <p><b>Cùng ôn tập và luyện tập:</b></p>
          <p>Bé hãy đọc thật kỹ đề bài câu hỏi hiển thị trên màn hình:</p>
          <div class="mt-2"><span class="step-number-badge">★</span>Xem các hình ảnh trực quan bổ trợ để đếm hoặc tính toán số liệu.</div>
          <div class="mt-2"><span class="step-number-badge">★</span>Bấm chọn 1 trong 4 đáp án đúng nhất để hoàn thành bài nhé!</div>
        `;
        visualHtml = `
          <div style="font-size: 4em;">✏️ Math</div>
        `;
      }

      insDiv.innerHTML = `
        <h2 class="instruction-title">💡 Hướng Dẫn Tự Học Trực Quan</h2>
        <div class="instruction-content">
          ${explanationHtml}
        </div>
        <div class="visual-container mx-auto mb-4">
          ${visualHtml}
        </div>
        <div class="text-center">
          <button class="btn-fun btn-start" onclick="startQuiz()">✍️ Con đã hiểu, Bắt đầu luyện tập!</button>
          <a href="../index.html" class="btn-fun btn-home">🏠 Quay lại trang chủ</a>
        </div>
      `;

      mainCard.appendChild(insDiv);
    }

    // Bắt đầu làm bài
    function startQuiz() {
      // Ẩn màn hình chào và màn hình hướng dẫn
      document.getElementById('welcome-screen').classList.add('hidden');
      const insScreen = document.querySelector('.instruction-screen');
      if (insScreen) insScreen.remove();

      document.getElementById('progress-container').classList.remove('hidden');
      document.getElementById('score-display').classList.remove('hidden');
      document.getElementById('quiz-area').classList.remove('hidden');

      // Sinh câu hỏi từ MathQuestionGenerator kết hợp Spaced Repetition từ progress
      quizQuestions = MathQuestionGenerator.generate(lessonData, ProgressManager.data, 10);
      
      if (quizQuestions.length === 0) {
        alert('Không tìm thấy hoặc không thể sinh câu hỏi cho bài này!');
        return;
      }

      currentQuestionIndex = 0;
      correctCount = 0;
      wrongCount = 0;
      streakCount = 0;
      maxStreak = 0;

      updateScoreDisplay();
      renderQuestion();
    }

    // Hiển thị câu hỏi
    function renderQuestion() {
      document.getElementById('explanation-panel').classList.add('hidden'); // Ẩn panel đặt tính
      
      const q = quizQuestions[currentQuestionIndex];
      const percent = Math.round((currentQuestionIndex / quizQuestions.length) * 100);
      
      document.getElementById('progress-text').textContent = `Câu ${currentQuestionIndex + 1}/${quizQuestions.length}`;
      document.getElementById('progress-bar').style.width = percent + '%';
      document.getElementById('progress-bar').textContent = percent + '%';

      const quizArea = document.getElementById('quiz-area');
      quizArea.innerHTML = '';

      // Tự động đọc câu hỏi và hướng dẫn
      speakInstruction(q);

      // Tạo Container nội dung câu hỏi
      const content = document.createElement('div');
      content.className = 'question-display-area';

      // Nút "Xem lại hướng dẫn lý thuyết" nhỏ ở góc
      const guideBtn = document.createElement('button');
      guideBtn.className = 'btn btn-sm btn-outline-warning rounded-pill mb-3 font-weight-bold';
      guideBtn.innerHTML = '💡 Xem lại hướng dẫn bài học';
      guideBtn.onclick = () => showGuidePopup(q);
      content.appendChild(guideBtn);

      // 1. Dạng văn bản (Lời văn)
      if (q.questionText) {
        const text = document.createElement('div');
        text.className = 'math-text-question';
        text.textContent = q.questionText;
        content.appendChild(text);
      }

      // 2. Dạng biểu thức số học cơ bản
      if (q.subtype === 'addition' || q.subtype === 'subtraction' || q.subtype === 'multiplication' || q.subtype === 'division') {
        if (!q.questionText) {
          const exp = document.createElement('div');
          exp.className = 'math-expression';
          exp.innerHTML = `
            <span>${q.a}</span>
            <span style="color:#ed8936; margin: 0 10px;">${q.op === '*' ? 'x' : q.op === '/' ? ':' : q.op}</span>
            <span>${q.b}</span>
            <span style="color:#718096; margin: 0 15px;">=</span>
            <span style="background:#edf2f7; border-radius:15px; padding: 5px 25px; border: 3px dashed #ed8936;">?</span>
          `;
          content.appendChild(exp);
        }
      }

      // 3. Dạng so sánh
      if (q.subtype === 'comparison' && !q.questionText) {
        const comp = document.createElement('div');
        comp.className = 'math-expression';
        comp.innerHTML = `
          <span>${q.a}</span>
          <span style="background:#edf2f7; border-radius:15px; padding: 5px 30px; border: 3px dashed #ed8936; margin: 0 20px;">?</span>
          <span>${q.b}</span>
        `;
        content.appendChild(comp);
      }

      // 4. Các yếu tố trực quan (Vẽ SVG)
      // a. Đồng hồ (xem giờ)
      if (q.clockData) {
        const visual = document.createElement('div');
        visual.className = 'visual-container';
        visual.innerHTML = drawClockSVG(q.clockData.h, q.clockData.m);
        content.appendChild(visual);
      }

      // b. Đổi đơn vị / Thước kẻ
      if (q.subtype === 'measurement' && q.expression.includes('=')) {
        const parts = q.expression.split('=');
        const numVal = parseInt(parts[0]);
        const unitFrom = parts[0].replace(/[0-9\s]/g, '');
        if (unitFrom === 'dm' || unitFrom === 'm') {
          const visual = document.createElement('div');
          visual.className = 'visual-container';
          visual.innerHTML = drawRulerSVG(numVal, unitFrom);
          content.appendChild(visual);
        }
      }

      // 5. Grid các nút phương án đáp án
      const optionsGrid = document.createElement('div');
      optionsGrid.className = 'options-grid';
      
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = (e) => checkAnswer(opt, q, btn);
        optionsGrid.appendChild(btn);
      });

      quizArea.appendChild(content);
      quizArea.appendChild(optionsGrid);
    }

    // Xem nhanh hướng dẫn lý thuyết khi làm bài
    function showGuidePopup(q) {
      const type = lessonData.type;
      let text = '';
      if (type.includes('addition_carry')) {
        text = "Hướng dẫn cộng có nhớ: Đặt tính thẳng cột. Cộng hàng đơn vị trước. Nếu kết quả hàng đơn vị lớn hơn hoặc bằng 10, viết chữ số đơn vị và nhớ 1 sang hàng chục.";
      } else if (type.includes('subtraction_borrow')) {
        text = "Hướng dẫn trừ có nhớ: Đặt tính thẳng cột. Nếu hàng đơn vị số bị trừ bé hơn, mượn 1 chục ở hàng trước để trừ, sau đó nhớ 1 trả lại vào hàng chục số trừ.";
      } else if (type === 'time_hours_minutes') {
        text = "Hướng dẫn xem đồng hồ: Kim ngắn chỉ giờ, kim dài chỉ phút. Kim dài chỉ số 12 là giờ đúng, chỉ số 6 là giờ rưỡi (30 phút).";
      } else if (type === 'length_dm_m_km') {
        text = "Hướng dẫn đo độ dài: Đặt một đầu vật trùng với vạch số 0. Đầu kia chỉ số nào thì đó là độ dài của vật. Nhớ đổi đơn vị: 1 dm = 10 cm, 1 m = 10 dm.";
      } else if (type.includes('multiplication')) {
        text = "Hướng dẫn phép nhân: Phép nhân là viết gọn của tổng các số giống nhau. Ví dụ 2 + 2 + 2 = 2 x 3 = 6.";
      } else if (type.includes('division')) {
        text = "Hướng dẫn phép chia: Phép chia dùng để chia đều đồ vật thành các phần bằng nhau. Ví dụ 6 quả chia đều cho 2 bạn, mỗi bạn được 6 : 2 = 3 quả.";
      } else {
        text = "Con hãy đọc thật kỹ đề bài và xem các hình ảnh gợi ý để chọn đáp án đúng nhé!";
      }
      alert('💡 Hướng dẫn học:\n' + text);
    }

    // Xử lý kiểm tra kết quả chọn đáp án
    async function checkAnswer(selected, q, btn) {
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(b => b.classList.add('disabled'));

      const isCorrect = String(selected).trim() === String(q.answer).trim();

      if (isCorrect) {
        btn.classList.add('correct');
        correctCount++;
        streakCount++;
        maxStreak = Math.max(maxStreak, streakCount);
        
        playAudioSuccess();
        triggerConfetti();

        // Hiệu ứng ngôi sao bay từ vị trí click
        const rect = btn.getBoundingClientRect();
        createStar(rect.left + rect.width / 2, rect.top + rect.height / 2);

        // Lưu tiến trình lên Firebase Realtime Database
        await saveProgress(q, true);

        updateScoreDisplay();
        
        // Chuyển câu hỏi sau 2 giây
        setTimeout(() => {
          currentQuestionIndex++;
          if (currentQuestionIndex < quizQuestions.length) {
            renderQuestion();
          } else {
            showSummary();
          }
        }, 2000);

      } else {
        btn.classList.add('wrong');
        wrongCount++;
        streakCount = 0;
        
        playAudioError();

        // Tìm nút đáp án đúng để highlight màu xanh
        buttons.forEach(b => {
          if (String(b.textContent).trim() === String(q.answer).trim()) {
            b.classList.add('correct');
          }
        });

        // Đặt tính dọc chi tiết để hướng dẫn tự học trực quan khi sai
        showVerticalExplanation(q);

        // Lưu tiến trình lên Firebase
        await saveProgress(q, false);

        updateScoreDisplay();

        // Chờ 8 giây (để bé đọc giải thích đặt tính dọc và hiểu lý do sai) sau đó mới tự động chuyển tiếp
        setTimeout(() => {
          currentQuestionIndex++;
          if (currentQuestionIndex < quizQuestions.length) {
            renderQuestion();
          } else {
            showSummary();
          }
        }, 8000);
      }
    }

    // Đồng bộ lưu tiến độ qua ProgressManager
    async function saveProgress(q, isCorrect) {
      if (typeof ProgressManager !== 'undefined' && ProgressManager.username) {
        const progressQuestion = {
          lessonId: currentLessonId,
          mathExpression: q.expression,
          type: 'math',
          subtype: q.subtype
        };
        try {
          await ProgressManager.update(progressQuestion, isCorrect);
          console.log('☁️ Đã đồng bộ tiến độ Toán lên Firebase.');
        } catch (e) {
          console.error('Lỗi khi đồng bộ tiến độ lên Firebase:', e);
        }
      }
    }

    // Hiển thị đặt tính dọc chi tiết
    function showVerticalExplanation(q) {
      const panel = document.getElementById('explanation-panel');
      panel.innerHTML = '';

      // Chỉ áp dụng đặt tính dọc cho các phép tính cộng/trừ 2 chữ số hoặc 3 chữ số
      if ((q.subtype === 'addition' || q.subtype === 'subtraction') && q.a >= 10 && q.b > 0) {
        const opStr = q.op === '+' ? '+' : '-';
        
        let carryExplanationHtml = '';
        if (q.subtype === 'addition') {
          const onesSum = (q.a % 10) + (q.b % 10);
          const carries = onesSum >= 10;
          
          carryExplanationHtml = `
            <div class="vertical-line-detail">
              <div><span class="step-number-badge">1</span>Hàng đơn vị: <b>${q.a % 10} + ${q.b % 10} = ${onesSum}</b>. ${carries ? `Viết <b>${onesSum % 10}</b> nhớ <b>1</b> sang hàng chục.` : `Viết <b>${onesSum}</b>.`}</div>
              <div class="mt-2"><span class="step-number-badge">2</span>Hàng chục: <b>${Math.floor(q.a / 10)} + ${Math.floor(q.b / 10)} = ${Math.floor(q.a / 10) + Math.floor(q.b / 10)}</b>. ${carries ? `Thêm <b>1</b> (nhớ) bằng <b>${Math.floor(q.a / 10) + Math.floor(q.b / 10) + 1}</b>. Viết <b>${Math.floor(q.a / 10) + Math.floor(q.b / 10) + 1}</b>.` : `Viết <b>${Math.floor(q.a / 10) + Math.floor(q.b / 10)}</b>.`}</div>
              <div class="mt-2 text-success font-weight-bold">🌟 Kết quả đúng là: <b>${q.answer}</b></div>
            </div>
          `;
        } else {
          const aOnes = q.a % 10;
          const bOnes = q.b % 10;
          const borrows = aOnes < bOnes;

          carryExplanationHtml = `
            <div class="vertical-line-detail">
              <div><span class="step-number-badge">1</span>Hàng đơn vị: <b>${aOnes}</b> không trừ được <b>${bOnes}</b>, ${borrows ? `ta mượn <b>1</b> chục ở hàng trước thành <b>${aOnes + 10} - ${bOnes} = ${aOnes + 10 - bOnes}</b>. Viết <b>${aOnes + 10 - bOnes}</b> nhớ <b>1</b>.` : `<b>${aOnes} - ${bOnes} = ${aOnes - bOnes}</b>. Viết <b>${aOnes - bOnes}</b>.`}</div>
              <div class="mt-2"><span class="step-number-badge">2</span>Hàng chục: ${borrows ? `Hàng chục của số trừ là <b>${Math.floor(q.b / 10)}</b> thêm <b>1</b> (nhớ) bằng <b>${Math.floor(q.b / 10) + 1}</b>. Tiếp tục: <b>${Math.floor(q.a / 10)} - ${Math.floor(q.b / 10) + 1} = ${Math.floor(q.a / 10) - (Math.floor(q.b / 10) + 1)}</b>. Viết <b>${Math.floor(q.a / 10) - (Math.floor(q.b / 10) + 1)}</b>.` : `<b>${Math.floor(q.a / 10)} - ${Math.floor(q.b / 10)} = ${Math.floor(q.a / 10) - Math.floor(q.b / 10)}</b>. Viết <b>${Math.floor(q.a / 10) - Math.floor(q.b / 10)}</b>.`}</div>
              <div class="mt-2 text-success font-weight-bold">🌟 Kết quả đúng là: <b>${q.answer}</b></div>
            </div>
          `;
        }

        panel.innerHTML = `
          <div class="explanation-title">💡 Hướng dẫn cách đặt tính dọc:</div>
          <div class="vertical-calc">
             ${q.a}<br>
          ${opStr}  ${q.b}<br>
          ------<br>
             ${q.answer}
          </div>
          ${carryExplanationHtml}
        `;
        panel.classList.remove('hidden');
        speakText('Đừng lo lắng! Hãy xem hướng dẫn cách đặt tính dọc ở dưới đây nhé!');
      } else {
        // Các dạng toán hình học hoặc tiền tệ, lời văn
        panel.innerHTML = `
          <div class="explanation-title">💡 Hướng dẫn ôn tập:</div>
          <div class="vertical-line-detail">
            Đáp án chính xác là: <b>${q.answer}</b>.<br>
            Em hãy nhớ đọc thật kỹ các thông tin đề bài cho trước khi chọn nhé!
          </div>
        `;
        panel.classList.remove('hidden');
      }
    }

    // Đọc hướng dẫn bằng giọng nói tiếng Việt
    function speakInstruction(q) {
      if (q.questionText) {
        speakText(q.questionText);
      } else if (q.subtype === 'addition') {
        speakText(`Phép tính: ${q.a} cộng ${q.b} bằng bao nhiêu?`);
      } else if (q.subtype === 'subtraction') {
        speakText(`Phép tính: ${q.a} trừ ${q.b} bằng bao nhiêu?`);
      } else if (q.subtype === 'multiplication') {
        speakText(`Phép tính: ${q.a} nhân ${q.b} bằng bao nhiêu?`);
      } else if (q.subtype === 'division') {
        speakText(`Phép tính: ${q.a} chia ${q.b} bằng bao nhiêu?`);
      } else if (q.subtype === 'comparison') {
        speakText(`Hãy so sánh số ${q.a} và số ${q.b}`);
      }
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'vi-VN';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

    // ===== SVG RENDERERS =====
    
    // Vẽ đồng hồ SVG
    function drawClockSVG(h, m) {
      const mAngle = m * 6;
      const hAngle = (h % 12) * 30 + (m * 0.5);

      return `
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="#ffffff" stroke="#ed8936" stroke-width="8" />
          <circle cx="100" cy="100" r="82" fill="#fffaf0" stroke="#f6ad55" stroke-width="2" />
          <circle cx="100" cy="100" r="6" fill="#2d3748" />
          ${Array.from({length: 12}).map((_, i) => {
            const angle = (i + 1) * 30 * Math.PI / 180;
            const x = 100 + 68 * Math.sin(angle);
            const y = 100 - 68 * Math.cos(angle);
            return `<text x="${x}" y="${y + 5}" text-anchor="middle" font-size="16" font-weight="700" fill="#4a5568">${i + 1}</text>`;
          }).join('')}
          <line x1="100" y1="100" x2="${100 + 40 * Math.sin(hAngle * Math.PI / 180)}" y2="${100 - 40 * Math.cos(hAngle * Math.PI / 180)}" stroke="#2d3748" stroke-width="6" stroke-linecap="round" />
          <line x1="100" y1="100" x2="${100 + 60 * Math.sin(mAngle * Math.PI / 180)}" y2="${100 - 60 * Math.cos(mAngle * Math.PI / 180)}" stroke="#e53e3e" stroke-width="4" stroke-linecap="round" />
        </svg>
      `;
    }

    // Vẽ thước kẻ SVG
    function drawRulerSVG(val, unit) {
      const lengthInCm = unit === 'dm' ? val * 10 : val;
      const scale = 15;
      const startX = 20;
      const rulerY = 90;

      let ticks = '';
      for (let i = 0; i <= 30; i++) {
        const x = startX + i * scale;
        const isMajor = i % 5 === 0;
        const tickHeight = isMajor ? 18 : 8;
        ticks += `<line x1="${x}" y1="${rulerY}" x2="${x}" y2="${rulerY + tickHeight}" stroke="#2d3748" stroke-width="${isMajor ? 2 : 1}" />`;
        if (isMajor) {
          ticks += `<text x="${x}" y="${rulerY + 32}" text-anchor="middle" font-size="10" font-weight="700" fill="#718096">${i}</text>`;
        }
      }

      const pencilLength = lengthInCm * scale;

      return `
        <svg width="100%" height="150" viewBox="0 0 500 150">
          <g transform="translate(${startX}, 40)">
            <rect x="0" y="0" width="${pencilLength - 15}" height="20" fill="#3182ce" rx="2" />
            <polygon points="${pencilLength - 15},0 ${pencilLength},10 ${pencilLength - 15},20" fill="#fbd38d" />
            <polygon points="${pencilLength - 5},7 ${pencilLength},10 ${pencilLength - 5},13" fill="#2d3748" />
            <rect x="0" y="0" width="8" height="20" fill="#e53e3e" rx="1" />
          </g>
          <rect x="${startX - 10}" y="${rulerY}" width="470" height="40" fill="#fefcbf" stroke="#ecc94b" stroke-width="3" rx="4" />
          ${ticks}
          <text x="470" y="${rulerY + 25}" font-size="12" font-weight="bold" fill="#dd6b20">cm</text>
        </svg>
      `;
    }

    // ===== AUDIO EFFECTS =====
    function playAudioSuccess() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function playAudioError() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 180;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.25);
    }

    // ===== CONFETTI EFFECT =====
    function triggerConfetti() {
      const colors = ['#f6d365', '#fda085', '#48bb78', '#38a169', '#3182ce', '#9f7aea'];
      for (let i = 0; i < 25; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = Math.random() * 1.5 + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 2500);
        }, i * 40);
      }
    }

    function createStar(x, y) {
      const star = document.createElement('div');
      star.className = 'star-pop';
      star.textContent = '⭐';
      star.style.left = x - 15 + 'px';
      star.style.top = y - 15 + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 1200);
    }
  </script>
