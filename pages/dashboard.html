<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Báo Cáo Tiến Độ Học Tập - English & Math Fun</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ===== PREMIUM DASHBOARD STYLE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #2d3748;
    }

    .container-main {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    /* Header Nav */
    .header-nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      padding: 15px 30px;
      margin-bottom: 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-title {
      font-size: 1.6em;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tab styles */
    .nav-tabs-custom {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 5px;
    }

    .nav-tabs-custom button {
      background: none;
      border: none;
      font-size: 1.25em;
      font-weight: 700;
      padding: 12px 24px;
      color: #718096;
      border-bottom: 4px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .nav-tabs-custom button.active-english {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .nav-tabs-custom button.active-math {
      color: #ed8936;
      border-bottom-color: #ed8936;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
      border: 1px solid #edf2f7;
      transition: all 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }

    .stat-card .icon {
      font-size: 2.2em;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 2.2em;
      font-weight: 700;
    }

    .stat-card .label {
      font-size: 0.95em;
      color: #718096;
      font-weight: 500;
      margin-top: 5px;
    }

    /* Layout grid */
    .layout-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      margin-bottom: 35px;
    }

    @media (max-width: 992px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }
    }

    .dashboard-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
      border: 1px solid #edf2f7;
    }

    .card-title {
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* List group */
    .wrong-list {
      max-height: 400px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
    }

    .wrong-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #edf2f7;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #fffaf0;
      transition: background 0.2s;
    }

    .wrong-item:hover {
      background: #feebc8;
    }

    .wrong-title {
      font-weight: 700;
      color: #2d3748;
    }

    .wrong-desc {
      font-size: 0.9em;
      color: #718096;
    }

    .wrong-stats {
      font-size: 0.9em;
      color: #e53e3e;
      font-weight: 700;
    }

    /* Lesson progress bar list */
    .lesson-row {
      margin-bottom: 20px;
    }

    .lesson-row-title {
      font-weight: 600;
      font-size: 1em;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .lesson-progress-outer {
      height: 12px;
      background: #edf2f7;
      border-radius: 6px;
      overflow: hidden;
    }

    .lesson-progress-inner {
      height: 100%;
      border-radius: 6px;
    }

    .student-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.95em;
    }

    .badge-math {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%) !important;
    }
  </style>
</head>

<body>
  <!-- Main Container -->
  <div class="container-main">
    <!-- Header Nav -->
    <div class="header-nav">
      <div class="nav-title">📊 Báo Cáo Tiến Độ Học Tập</div>
      <div class="d-flex align-items-center gap-3">
        <span class="student-badge" id="user-badge">👤 Học sinh: ---</span>
        <a href="../index.html" class="btn btn-outline-secondary rounded-pill font-weight-bold">🏠 Về Trang Chủ</a>
      </div>
    </div>

    <!-- Subject Switcher Tab -->
    <div class="nav-tabs-custom">
      <button id="tab-english" class="active-english" onclick="switchTab('english')">🇬🇧 Tiếng Anh Lớp 2</button>
      <button id="tab-math" onclick="switchTab('math')">🔢 Toán Lớp 2</button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="stats-grid">
      <!-- Sẽ được điền động -->
    </div>

    <!-- Layout Grid -->
    <div class="layout-grid">
      <!-- Cột trái: Biểu đồ & Chi tiết bài học -->
      <div class="d-flex flex-column gap-4">
        <!-- Biểu đồ -->
        <div class="dashboard-card">
          <div class="card-title">📈 Hoạt động học tập (Ngày học)</div>
          <div style="height: 320px; position: relative;">
            <canvas id="learningChart"></canvas>
          </div>
        </div>

        <!-- Chi tiết tiến độ từng bài -->
        <div class="dashboard-card">
          <div class="card-title">📚 Chi tiết mức độ hoàn thành bài học</div>
          <div id="lessons-progress-container" style="max-height: 450px; overflow-y: auto; padding-right: 10px;">
            <!-- Render bài học -->
          </div>
        </div>
      </div>

      <!-- Cột phải: Các nội dung cần ôn tập (hay chọn sai) -->
      <div class="dashboard-card h-100">
        <div class="card-title">⚠️ Nội dung cần ôn tập thêm</div>
        <p class="text-muted small">Danh sách từ vựng/phép tính bé thường làm sai hoặc chưa thành thạo.</p>
        <ul class="wrong-list" id="wrong-list-container">
          <!-- Render list sai -->
        </ul>
      </div>
    </div>
  </div>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Script references -->
  <script src="../js/firebase-config.js"></script>
  <script src="../js/quiz-progress.js"></script>
  <script src="../data/english_lessons.js"></script>
  <script src="../data/math_lessons.js"></script>
  <script src="../js/lesson-loader.js"></script>

  <!-- Dashboard application script -->
  <script>
    let currentSubject = 'english';
    let lessonsData = { english: [], math: [] };
    let chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Init ProgressManager
      await ProgressManager.init();

      // Kiểm tra xem đã đăng nhập chưa
      if (!ProgressManager.username) {
        alert('Vui lòng đăng nhập tài khoản ở trang chủ trước khi xem tiến độ!');
        window.location.href = '../index.html';
        return;
      }

      // Cập nhật tên học sinh
      const badge = document.getElementById('user-badge');
      badge.textContent = `👤 Học sinh: ${ProgressManager.fullName} (${ProgressManager.username})`;

      // 2. Load toàn bộ danh sách bài học của cả 2 môn
      try {
        const engData = await LessonLoader.loadAllLessons('english');
        lessonsData.english = engData.lessons;

        const mathData = await LessonLoader.loadAllLessons('math');
        lessonsData.math = mathData.lessons;
      } catch (err) {
        console.error('Lỗi khi tải bài học:', err);
      }

      // 3. Render dữ liệu
      renderDashboard();
    });

    // Chuyển tab môn học
    function switchTab(subject) {
      currentSubject = subject;
      
      const tabEng = document.getElementById('tab-english');
      const tabMath = document.getElementById('tab-math');
      const userBadge = document.getElementById('user-badge');

      tabEng.className = '';
      tabMath.className = '';

      if (subject === 'english') {
        tabEng.className = 'active-english';
        userBadge.classList.remove('badge-math');
      } else {
        tabMath.className = 'active-math';
        userBadge.classList.add('badge-math');
      }

      renderDashboard();
    }

    // Render thông số
    function renderDashboard() {
      renderStats();
      renderLessonsProgress();
      renderWrongList();
      renderChart();
    }

    // Render Thống kê dạng Card
    function renderStats() {
      const stats = ProgressManager.getStats(currentSubject);
      const grid = document.getElementById('stats-grid');
      
      let totalLessons = currentSubject === 'english' ? lessonsData.english.length : lessonsData.math.length;

      // Tính tổng số lượng từ vựng (Tiếng Anh) hoặc phép tính đã làm (Toán)
      let totalItemsCount = 0;
      if (currentSubject === 'english') {
        lessonsData.english.forEach(l => {
          totalItemsCount += l.words.length;
          l.words.forEach(w => { if (w.sentences) totalItemsCount += w.sentences.length; });
        });
      } else {
        totalItemsCount = 75; // 75 bài toán
      }

      // Tính tỷ lệ phần trăm
      const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
      const masteredPercent = totalItemsCount > 0 ? Math.round((stats.mastered / totalItemsCount) * 100) : 0;

      grid.innerHTML = `
        <div class="stat-card">
          <div class="icon">📚</div>
          <div class="value" style="color: ${currentSubject === 'english' ? '#667eea' : '#ed8936'};">${totalLessons}</div>
          <div class="label">Tổng Số Bài Học</div>
        </div>
        <div class="stat-card">
          <div class="icon">✨</div>
          <div class="value text-success">${stats.mastered}</div>
          <div class="label">Đã Thành Thạo (>= 80% đúng)</div>
        </div>
        <div class="stat-card">
          <div class="icon">🎯</div>
          <div class="value text-warning">${accuracy}%</div>
          <div class="label">Tỷ Lệ Trả Lời Đúng</div>
        </div>
        <div class="stat-card">
          <div class="icon">📈</div>
          <div class="value text-info">${masteredPercent}%</div>
          <div class="label">Tiến Độ Hoàn Thành Môn</div>
        </div>
      `;
    }

    // Render Chi tiết Bài học
    function renderLessonsProgress() {
      const container = document.getElementById('lessons-progress-container');
      container.innerHTML = '';

      const lessons = currentSubject === 'english' ? lessonsData.english : lessonsData.math;
      
      lessons.forEach(l => {
        // Lấy tiến độ của bài học này
        let totalItems = 0;
        let masteredCount = 0;

        if (currentSubject === 'english') {
          totalItems = l.words.length;
          l.words.forEach(w => { if (w.sentences) totalItems += w.sentences.length; });

          const progressList = ProgressManager.data.progress.filter(p => p.lessonId === l.id && p.type !== 'math');
          masteredCount = progressList.filter(p => {
            const sum = (p.correct || 0) + (p.wrong || 0);
            return sum >= 5 && (p.correct || 0)/sum >= 0.8 && (p.wrong || 0) === 0;
          }).length;
        } else {
          totalItems = 5; // Giả định mỗi bài toán bé làm thành công 5 phép tính là hoàn thành
          const progressList = ProgressManager.data.progress.filter(p => p.lessonId === l.id && p.type === 'math');
          masteredCount = Math.min(5, progressList.filter(p => {
            const sum = (p.correct || 0) + (p.wrong || 0);
            return sum >= 3 && (p.correct || 0)/sum >= 0.8;
          }).length);
        }

        const percent = totalItems > 0 ? Math.round((masteredCount / totalItems) * 100) : 0;
        
        const row = document.createElement('div');
        row.className = 'lesson-row';
        row.innerHTML = `
          <div class="lesson-row-title">
            <span>${l.title}</span>
            <span class="text-muted small">${masteredCount}/${totalItems} (${percent}%)</span>
          </div>
          <div class="lesson-progress-outer">
            <div class="lesson-progress-inner" style="width: ${percent}%; background: ${currentSubject === 'english' ? 'linear-gradient(90deg, #667eea 0%, #764ba2 100%)' : 'linear-gradient(90deg, #f6d365 0%, #fda085 100%)'};"></div>
          </div>
        `;
        container.appendChild(row);
      });
    }

    // Render danh sách ôn tập (Lọc câu làm sai)
    function renderWrongList() {
      const container = document.getElementById('wrong-list-container');
      container.innerHTML = '';

      // Lọc trong progress những phần tử có wrong > correct hoặc wrong > 0
      const progress = ProgressManager.data.progress;
      let wrongItems = [];

      if (currentSubject === 'english') {
        wrongItems = progress.filter(p => p.type !== 'math' && (p.wrong || 0) > 0);
      } else {
        wrongItems = progress.filter(p => p.type === 'math' && (p.wrong || 0) > 0);
      }

      // Sắp xếp sai nhiều lên đầu
      wrongItems.sort((a, b) => (b.wrong || 0) - (a.wrong || 0));

      if (wrongItems.length === 0) {
        container.innerHTML = `
          <div class="text-center p-4 text-muted">
            🎉 Tuyệt vời! Chưa phát hiện nội dung nào làm sai cần ôn tập.
          </div>
        `;
        return;
      }

      wrongItems.slice(0, 15).forEach(item => {
        const li = document.createElement('li');
        li.className = 'wrong-item';
        
        let title = '';
        let desc = '';

        if (currentSubject === 'english') {
          title = item.word || item.sentence.en;
          desc = item.word ? `Từ vựng (Bài ${item.lessonId})` : `Mẫu câu (Bài ${item.lessonId})`;
        } else {
          title = item.mathExpression || 'Phép toán';
          desc = `Phép tính (Bài ${item.lessonId})`;
        }

        li.innerHTML = `
          <div>
            <div class="wrong-title">${title}</div>
            <div class="wrong-desc">${desc}</div>
          </div>
          <div class="wrong-stats">❌ Sai ${item.wrong} lần</div>
        `;
        container.appendChild(li);
      });
    }

    // Vẽ biểu đồ 7 ngày qua
    function renderChart() {
      const ctx = document.getElementById('learningChart').getContext('2d');
      
      // Tạo danh sách 7 ngày qua
      const labels = [];
      const dataPoints = [];
      const progress = ProgressManager.data.progress;

      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        labels.push(d.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' }));

        // Đếm số lượng từ/câu hoặc phép tính ôn tập vào ngày này
        let count = 0;
        progress.forEach(p => {
          if (p.lastReviewed && p.lastReviewed.startsWith(dateStr)) {
            if (currentSubject === 'english' && p.type !== 'math') count++;
            if (currentSubject === 'math' && p.type === 'math') count++;
          }
        });
        dataPoints.push(count);
      }

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: currentSubject === 'english' ? 'Số từ/câu đã luyện tập' : 'Số phép toán đã luyện tập',
            data: dataPoints,
            borderColor: currentSubject === 'english' ? '#667eea' : '#ed8936',
            backgroundColor: currentSubject === 'english' ? 'rgba(102, 126, 234, 0.1)' : 'rgba(237, 137, 54, 0.1)',
            borderWidth: 4,
            tension: 0.3,
            fill: true,
            pointBackgroundColor: currentSubject === 'english' ? '#764ba2' : '#fda085',
            pointRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1,
                precision: 0
              },
              grid: {
                color: '#edf2f7'
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
    }
  </script>
</body>

</html>
